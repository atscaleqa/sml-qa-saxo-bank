unique_name: RE
object_type: model
label: RE
dimensions: []
include_default_drillthrough: true
metrics:
  - unique_name: m_REAL_EARNINGS_DKK_sum
    folder: Real Earnings
relationships:
  - unique_name: VW_REAL_EARNINGS.dataset_Buy_Sell
    from:
      dataset: VW_REAL_EARNINGS.dataset
      join_columns:
        - BUY_SELL
    to:
      dimension: Buy Sell
      level: Buy Sell Level
  - unique_name: VW_REAL_EARNINGS.dataset_Subsidiaries
    from:
      dataset: VW_REAL_EARNINGS.dataset
      join_columns:
        - SUBSIDIARY_ID
    to:
      dimension: Subsidiaries
      level: Subsidiaries Level
  - unique_name: VW_REAL_EARNINGS.dataset_Contract
    from:
      dataset: VW_REAL_EARNINGS.dataset
      join_columns:
        - HK_COMPOSITE_CONTRACT
    to:
      dimension: Contract
      level: HKCompositeContract
  - unique_name: VW_REAL_EARNINGS.dataset_Order_Placement_Tools_OrderPlacementTools
    from:
      dataset: VW_REAL_EARNINGS.dataset
      join_columns:
        - ORDER_PLACEMENT_TOOL_ID
