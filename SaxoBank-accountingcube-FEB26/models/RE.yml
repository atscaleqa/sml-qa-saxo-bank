    from:
      dataset: VW_REAL_EARNINGS.dataset
      join_columns:
        - HK_COMPOSITE_INSTRUMENT
    to:
      dimension: Instruments
      level: Instruments Level
  - unique_name: VW_REAL_EARNINGS.dataset_Earnings
    from:
      dataset: VW_REAL_EARNINGS.dataset
      join_columns:
        - EARNINGS_TYPE_ID
    to:
      dimension: Earnings
      level: EarningsLevel 05
  - unique_name: VW_REAL_EARNINGS.dataset_Accounts
    from:
      dataset: VW_REAL_EARNINGS.dataset
