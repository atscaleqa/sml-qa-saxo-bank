unique_name: Accounting Cube
object_type: composite_model
label: Accounting Cube
description: composite model containing bme , re and mme
aggregates:
  - unique_name: UDA_MME_BME_TOP_LEVEL
    label: UDA_MME_BME_TOP_LEVEL
    attributes:
      - name: EarningsLevel 02
        dimension: Earnings
      - name: EarningsLevel 03
        dimension: Earnings
      - name: EarningsLevel 04
        dimension: Earnings
      - name: EarningsLevel 05
        dimension: Earnings
      - name: Product Hierarchy Level1
        dimension: Real Earnings Hierarchies
      - name: Product Hierarchy Level2
        dimension: Real Earnings Hierarchies
      - name: EGO Booking Type
        dimension: Real Earnings Hierarchies
      - name: View Description
        dimension: Real Earnings Hierarchies
      - name: EGO AttainKey
        dimension: Real Earnings Hierarchies
      - name: d_TOP_LEVEL_CONTRACT_ID
        dimension: Top Level Contract
      - name: d_TOP_LEVEL_CONTRACT_NAME
        dimension: Top Level Contract
      - name: ContractName
        dimension: Contract
      - name: Year1
        dimension: Dates
      - name: Quarter
        dimension: Dates
      - name: Month1
        dimension: Dates
    metrics:
      - m_BENCHMARK_EARNING_DKK_sum
      - m_ALLOCATION_AMOUNT_DKK_sum
metrics:
  - unique_name: TRE Allocated
    folder: MME Allocation
  - unique_name: TRE Estimate Allocated
    folder: MME Allocation
models:
  - BME
  - MME
  - RE
